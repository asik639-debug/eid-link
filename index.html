<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placeholder Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #141111;
      font-family: Arial, sans-serif;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #333;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <button onclick="goToLink()">Press</button>

  <script>
    function goToLink() {
      window.location.href = "https://openwhenletters.app/";
    }
  </script>
</body>
</html>
